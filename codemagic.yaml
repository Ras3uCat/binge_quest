workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 60
    working_directory: execution/frontend/flutter

    integrations:
      app_store_connect: Codemagic API

    environment:
      flutter: stable
      xcode: latest
      groups:
        - secure
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ras3ucat.bingeQuest

    scripts:
      - name: Generate env.dart
        script: |
          cat > lib/core/config/env.dart << EOF
          class Env {
            Env._();
            static const String supabaseUrl = '$SUPABASE_URL';
            static const String supabaseAnonKey = '$SUPABASE_ANON_KEY';
            static const String tmdbApiKey = '$TMDB_API_KEY';
          }
          EOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.ras3ucat.bingeQuest" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-number=$((51 + $PROJECT_BUILD_NUMBER)) \
            --export-options-plist=$HOME/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-play-store:
    name: Android Play Store Build
    max_build_duration: 60
    working_directory: execution/frontend/flutter

    environment:
      flutter: stable
      groups:
        - secure

    scripts:
      - name: Generate env.dart
        script: |
          cat > lib/core/config/env.dart << EOF
          class Env {
            Env._();
            static const String supabaseUrl = '$SUPABASE_URL';
            static const String supabaseAnonKey = '$SUPABASE_ANON_KEY';
            static const String tmdbApiKey = '$TMDB_API_KEY';
          }
          EOF

      - name: Set up Android signing
        script: |
          echo $KEYSTORE_BASE64 | base64 --decode > $CM_BUILD_DIR/release.jks
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$CM_BUILD_DIR/release.jks
          EOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --build-number=$((51 + $PROJECT_BUILD_NUMBER))

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
